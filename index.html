<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wisteria Protocol</title>
    <style>
        :root {
            --bg: #07090d;
            --panel: rgba(10, 12, 16, 0.76);
            --panel-strong: rgba(14, 16, 22, 0.9);
            --fog: rgba(210, 216, 222, 0.08);
            --line: rgba(255, 255, 255, 0.18);
            --gold: #d4a34a;
            --gold-soft: #f0d6a2;
            --text: #f2eee8;
            --muted: rgba(255, 255, 255, 0.58);
            --accent: #a71b1b;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            min-height: 100%;
        }

        body {
            overflow: hidden;
            background:
                radial-gradient(circle at 50% 12%, rgba(255, 255, 255, 0.15), transparent 24%),
                radial-gradient(circle at 20% 24%, rgba(255, 255, 255, 0.11), transparent 20%),
                radial-gradient(circle at 80% 24%, rgba(255, 255, 255, 0.11), transparent 20%),
                linear-gradient(180deg, #0d1016 0%, #090b10 32%, #06070a 100%);
            color: var(--text);
            font-family: "Bahnschrift", "Segoe UI", sans-serif;
        }

        .screen {
            position: relative;
            min-height: 100vh;
            isolation: isolate;
            cursor: pointer;
            background:
                linear-gradient(90deg, rgba(0, 0, 0, 0.92), transparent 10%, transparent 90%, rgba(0, 0, 0, 0.92)),
                linear-gradient(180deg, rgba(255, 255, 255, 0.04), transparent 28%, transparent 72%, rgba(0, 0, 0, 0.25)),
                radial-gradient(circle at 50% 36%, rgba(255, 255, 255, 0.12), transparent 25%);
        }

        .screen::before,
        .screen::after {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
        }

        .screen::before {
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.07), transparent 22%),
                linear-gradient(0deg, rgba(0, 0, 0, 0.68), transparent 25%),
                repeating-linear-gradient(
                    90deg,
                    rgba(255, 255, 255, 0.032) 0,
                    rgba(255, 255, 255, 0.032) 2px,
                    transparent 2px,
                    transparent 80px
                );
            opacity: 0.75;
            mix-blend-mode: screen;
        }

        .screen::after {
            background:
                radial-gradient(circle at 50% 50%, transparent 42%, rgba(0, 0, 0, 0.72) 100%),
                repeating-linear-gradient(
                    180deg,
                    rgba(255, 255, 255, 0.03) 0,
                    rgba(255, 255, 255, 0.03) 1px,
                    transparent 1px,
                    transparent 4px
                );
            opacity: 0.7;
        }

        .beam {
            position: absolute;
            top: -10vh;
            width: 20vw;
            height: 82vh;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.25), rgba(255, 255, 255, 0.02) 80%, transparent);
            filter: blur(8px);
            opacity: 0.65;
            transform-origin: top center;
            pointer-events: none;
        }

        .beam-left {
            left: 16%;
            transform: skewX(-8deg);
        }

        .beam-center {
            left: 40%;
            width: 18vw;
        }

        .beam-right {
            right: 16%;
            transform: skewX(8deg);
        }

        .architecture {
            position: absolute;
            inset: 0;
            pointer-events: none;
        }

        .architecture::before,
        .architecture::after {
            content: "";
            position: absolute;
            top: 0;
            bottom: 20vh;
            width: 24vw;
            opacity: 0.4;
            background:
                linear-gradient(90deg, rgba(255, 255, 255, 0.08), transparent 22%),
                repeating-linear-gradient(
                    180deg,
                    rgba(255, 255, 255, 0.14) 0,
                    rgba(255, 255, 255, 0.14) 5px,
                    transparent 5px,
                    transparent 16px
                );
            filter: blur(0.5px);
        }

        .architecture::before {
            left: 6vw;
            transform: perspective(800px) rotateY(25deg);
        }

        .architecture::after {
            right: 6vw;
            transform: perspective(800px) rotateY(-25deg);
        }

        .hall {
            position: absolute;
            left: 50%;
            top: 8vh;
            width: min(74vw, 980px);
            height: 56vh;
            transform: translateX(-50%);
            opacity: 0.55;
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0.03) 14%, transparent 14%),
                repeating-linear-gradient(
                    180deg,
                    rgba(255, 255, 255, 0.13) 0,
                    rgba(255, 255, 255, 0.13) 6px,
                    transparent 6px,
                    transparent 22px
                );
            clip-path: polygon(20% 0, 80% 0, 95% 100%, 5% 100%);
            filter: blur(0.6px);
        }

        .hall::before {
            content: "";
            position: absolute;
            inset: 10% 12% 24%;
            border-top: 4px solid rgba(255, 255, 255, 0.28);
            border-bottom: 4px solid rgba(255, 255, 255, 0.18);
        }

        .monolith {
            position: absolute;
            left: 50%;
            top: 18vh;
            width: min(28vw, 360px);
            height: 34vh;
            background: linear-gradient(180deg, rgba(8, 10, 14, 0.98), rgba(20, 22, 28, 0.8));
            clip-path: polygon(16% 0, 88% 18%, 70% 100%, 26% 100%);
            transform: translateX(-50%);
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.45);
        }

        .monolith::before {
            content: "";
            position: absolute;
            left: -12%;
            top: 12%;
            width: 112%;
            height: 18%;
            background: linear-gradient(90deg, transparent, rgba(0, 0, 0, 0.95) 12%, rgba(0, 0, 0, 0.8));
            clip-path: polygon(32% 0, 100% 18%, 78% 100%, 0 78%);
            transform: rotate(-14deg);
        }

        .fog {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 12vh;
            height: 26vh;
            background:
                radial-gradient(circle at 20% 60%, rgba(255, 255, 255, 0.16), transparent 26%),
                radial-gradient(circle at 50% 34%, rgba(255, 255, 255, 0.1), transparent 28%),
                radial-gradient(circle at 78% 58%, rgba(255, 255, 255, 0.14), transparent 24%);
            filter: blur(20px);
            opacity: 0.6;
            pointer-events: none;
        }

        .particles,
        .particles::before,
        .particles::after {
            position: absolute;
            inset: 0;
            content: "";
            pointer-events: none;
            background-image:
                radial-gradient(circle, rgba(255, 255, 255, 0.8) 0 1px, transparent 1.5px),
                radial-gradient(circle, rgba(255, 255, 255, 0.5) 0 1px, transparent 1.6px),
                radial-gradient(circle, rgba(255, 255, 255, 0.35) 0 1px, transparent 1.8px);
            background-size: 240px 240px, 320px 320px, 420px 420px;
            background-position: 16% 24%, 74% 44%, 42% 78%;
            opacity: 0.35;
        }

        .particles {
            animation: floatDust 18s linear infinite;
        }

        .particles::before {
            animation: floatDust 24s linear infinite reverse;
        }

        .particles::after {
            animation: floatDust 28s linear infinite;
        }

        .brand {
            position: absolute;
            top: 5vh;
            left: clamp(18px, 4vw, 54px);
            color: var(--gold-soft);
            font-size: clamp(1.4rem, 3vw, 2.5rem);
            font-weight: 700;
            letter-spacing: 0.08em;
            opacity: 0.95;
        }

        .brand small {
            display: block;
            margin-top: 0.25rem;
            font-size: 0.42em;
            letter-spacing: 0.45em;
            color: rgba(255, 238, 209, 0.7);
        }

        .content {
            position: relative;
            z-index: 2;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 10vh 4vw 14vh;
        }

        .hero {
            width: min(92vw, 1180px);
            display: grid;
            justify-items: center;
            gap: 1.4rem;
            text-align: center;
        }

        .title-block {
            display: grid;
            grid-template-columns: auto auto;
            align-items: center;
            gap: clamp(12px, 2vw, 30px);
            filter: drop-shadow(0 10px 24px rgba(0, 0, 0, 0.5));
        }

        .crest {
            width: clamp(72px, 9vw, 130px);
            aspect-ratio: 0.8;
            position: relative;
            background:
                radial-gradient(circle at 50% 56%, #f5d17f 0 9%, transparent 10%),
                linear-gradient(180deg, #7a0b0b 0%, #cb1e1a 55%, #420303 100%);
            clip-path: polygon(50% 0, 62% 12%, 74% 16%, 72% 54%, 100% 84%, 76% 86%, 66% 100%, 50% 92%, 34% 100%, 24% 86%, 0 84%, 28% 54%, 26% 16%, 38% 12%);
            border: 2px solid rgba(15, 0, 0, 0.7);
            box-shadow: inset 0 0 18px rgba(0, 0, 0, 0.45);
        }

        .crest::before,
        .crest::after {
            content: "";
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        .crest::before {
            top: 8%;
            width: 26%;
            height: 22%;
            background: radial-gradient(circle at 50% 80%, #f7d98e 0 20%, #ae6a0a 45%, transparent 46%);
            filter: blur(0.5px);
        }

        .crest::after {
            bottom: 10%;
            width: 72%;
            height: 12%;
            background: linear-gradient(90deg, transparent, #f0c66f 20%, #f0c66f 80%, transparent);
            opacity: 0.65;
        }

        .title {
            margin: 0;
            font-size: clamp(3rem, 10vw, 7.2rem);
            line-height: 0.82;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            font-weight: 900;
            color: #1d1405;
            text-shadow:
                0 2px 0 #ffe6ad,
                0 0 28px rgba(255, 208, 111, 0.24);
        }

        .title span {
            display: block;
            padding: 0.02em 0.12em;
            background:
                linear-gradient(180deg, #ffebae 0%, #f0b928 28%, #d28b13 55%, #ffd96b 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            position: relative;
        }

        .title span::after {
            content: "";
            position: absolute;
            inset: 8% 2%;
            background:
                linear-gradient(135deg, rgba(255, 255, 255, 0.18), transparent 42%),
                repeating-linear-gradient(
                    90deg,
                    transparent 0,
                    transparent 16px,
                    rgba(0, 0, 0, 0.08) 16px,
                    rgba(0, 0, 0, 0.08) 20px
                );
            mix-blend-mode: overlay;
            pointer-events: none;
        }

        .tagline-frame {
            width: min(100%, 1120px);
            padding: 0.35rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: linear-gradient(180deg, rgba(130, 133, 138, 0.45), rgba(21, 22, 25, 0.85));
            box-shadow:
                0 0 0 1px rgba(255, 255, 255, 0.08) inset,
                0 8px 22px rgba(0, 0, 0, 0.28);
        }

        .tagline {
            position: relative;
            overflow: hidden;
            padding: clamp(12px, 2vw, 18px) 18px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background:
                linear-gradient(90deg, rgba(255, 255, 255, 0.04), rgba(0, 0, 0, 0.32) 8%, rgba(0, 0, 0, 0.32) 92%, rgba(255, 255, 255, 0.04)),
                linear-gradient(180deg, rgba(255, 255, 255, 0.06), rgba(8, 9, 12, 0.86));
            color: #f3eee6;
            font-size: clamp(1rem, 2.4vw, 2.15rem);
            font-weight: 700;
            letter-spacing: 0.32em;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .tagline::before,
        .tagline::after {
            content: "";
            position: absolute;
            top: 50%;
            width: 18%;
            height: 100%;
            transform: translateY(-50%);
            opacity: 0.24;
            background:
                repeating-linear-gradient(
                    90deg,
                    transparent 0,
                    transparent 14px,
                    rgba(255, 255, 255, 0.08) 14px,
                    rgba(255, 255, 255, 0.08) 18px
                );
        }

        .tagline::before {
            left: 0;
        }

        .tagline::after {
            right: 0;
        }

        .touch-panel {
            position: relative;
            width: min(100%, 840px);
            margin-top: 0.6rem;
            padding: 1.2rem 1rem 1rem;
            background: linear-gradient(180deg, rgba(25, 26, 31, 0.18), rgba(8, 8, 10, 0.52));
        }

        .touch-panel::before {
            content: "";
            position: absolute;
            left: 8%;
            right: 8%;
            top: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.14), transparent);
        }

        .touch-text {
            margin: 0;
            color: rgba(255, 255, 255, 0.86);
            font-size: clamp(1rem, 2.6vw, 2rem);
            font-weight: 800;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            animation: pulse 1.8s ease-in-out infinite;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.16);
        }

        .hint {
            margin-top: 0.75rem;
            color: var(--muted);
            font-size: clamp(0.72rem, 1.4vw, 0.92rem);
            letter-spacing: 0.26em;
            text-transform: uppercase;
        }

        .status {
            position: absolute;
            right: clamp(16px, 4vw, 44px);
            bottom: clamp(16px, 4vh, 36px);
            text-align: right;
            color: rgba(241, 181, 80, 0.88);
            font-size: clamp(0.8rem, 1.2vw, 1rem);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            z-index: 2;
        }

        .status strong {
            display: block;
            font-size: clamp(1.2rem, 2.2vw, 2rem);
            line-height: 1;
        }

        .startup-line {
            margin-top: 0.28rem;
            color: rgba(255, 255, 255, 0.48);
            letter-spacing: 0.28em;
            font-size: 0.74em;
        }

        .screen.started {
            animation: awaken 1.2s ease forwards;
        }

        .screen.started .touch-text {
            animation: none;
            opacity: 1;
        }

        .screen.started .tagline {
            color: #ffefcf;
            text-shadow: 0 0 18px rgba(255, 216, 145, 0.26);
        }

        .screen.started .monolith {
            box-shadow:
                0 0 24px rgba(255, 235, 200, 0.12),
                0 24px 60px rgba(0, 0, 0, 0.5);
        }

        @keyframes pulse {
            0%,
            100% {
                opacity: 0.24;
                transform: translateY(0);
            }
            50% {
                opacity: 1;
                transform: translateY(-2px);
            }
        }

        @keyframes floatDust {
            0% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
            100% {
                transform: translateY(0);
            }
        }

        @keyframes awaken {
            0% {
                filter: brightness(1);
            }
            45% {
                filter: brightness(1.08);
            }
            100% {
                filter: brightness(1);
            }
        }

        @media (max-width: 720px) {
            .content {
                padding-top: 12vh;
                padding-bottom: 10vh;
            }

            .title-block {
                grid-template-columns: 1fr;
                gap: 0.85rem;
            }

            .tagline {
                letter-spacing: 0.18em;
                font-size: clamp(0.88rem, 4vw, 1.15rem);
            }

            .hint {
                letter-spacing: 0.18em;
            }

            .status {
                left: 20px;
                right: 20px;
                bottom: 18px;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <main class="screen" id="start-screen" data-start-url="main.html">
        <div class="beam beam-left"></div>
        <div class="beam beam-center"></div>
        <div class="beam beam-right"></div>
        <div class="architecture"></div>
        <div class="hall"></div>
        <div class="monolith" aria-hidden="true"></div>
        <div class="fog"></div>
        <div class="particles"></div>

        <div class="brand" aria-hidden="true">
            WW
            <small>WISTERIA WILSON</small>
        </div>

        <section class="content" aria-label="Game start screen">
            <div class="hero">
                <div class="title-block">
                    <div class="crest" aria-hidden="true"></div>
                    <h1 class="title" aria-label="Wisteria Protocol">
                        <span>Wisteria</span>
                        <span>Protocol</span>
                    </h1>
                </div>

                <div class="tagline-frame">
                    <div class="tagline" id="tagline">Enter the hush, awaken the signal</div>
                </div>

                <div class="touch-panel">
                    <p class="touch-text" id="start-text">Touch to start</p>
                    <div class="hint">Click anywhere or press Enter</div>
                </div>
            </div>
        </section>

        <div class="status" id="status-text">
            <strong>v0.1.0</strong>
            <div>Protocol standby</div>
            <div class="startup-line">Route linked to main hub</div>
        </div>
    </main>

    <script>
        const screen = document.getElementById("start-screen");
        const startText = document.getElementById("start-text");
        const tagline = document.getElementById("tagline");
        const status = document.getElementById("status-text");

        let isStarting = false;

        function beginStartup() {
            if (isStarting) {
                return;
            }

            isStarting = true;
            screen.classList.add("started");
            startText.textContent = "Initializing...";
            tagline.textContent = "Signal lock acquired";
            status.innerHTML = "<strong>v0.1.0</strong><div>System online</div><div class=\"startup-line\">Opening main hub</div>";

            const startUrl = screen.dataset.startUrl && screen.dataset.startUrl.trim();
            window.setTimeout(() => {
                window.location.href = startUrl || "main.html";
            }, 1200);
        }

        screen.addEventListener("click", beginStartup);
        window.addEventListener("keydown", (event) => {
            if (event.key === "Enter" || event.key === " ") {
                event.preventDefault();
                beginStartup();
            }
        });
    </script>
</body>
</html>
