<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wisteria Archive</title>
    <link rel="icon" href="assets/wisteria-mark.svg" type="image/svg+xml">
    <style>
        :root {
            --scene-image: url("assets/tears-in-rain-expanded.jpg");
            --font-cn: "HarmonyOS Sans SC", "MiSans", "Source Han Sans SC", "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
            --font-display: "Space Grotesk", "IBM Plex Sans", "Rajdhani", "DIN Alternate", "Bahnschrift", sans-serif;
            --font-mono: "IBM Plex Mono", "Cascadia Mono", "SFMono-Regular", Consolas, monospace;
            --bg: #140703;
            --bg-deep: #070302;
            --text: #f5dfb7;
            --text-soft: rgba(245, 223, 183, 0.68);
            --text-faint: rgba(245, 223, 183, 0.38);
            --amber: #d8a04d;
            --amber-soft: rgba(216, 160, 77, 0.42);
            --amber-faint: rgba(216, 160, 77, 0.16);
            --rust: #9c3c13;
            --line: rgba(255, 215, 146, 0.18);
            --line-strong: rgba(255, 222, 162, 0.38);
            --shadow-soft: 0 24px 80px rgba(30, 7, 0, 0.42);
            --radius-sm: 4px;
            --radius-md: 10px;
            --space: clamp(18px, 3.8vw, 58px);
            --duration-slow: 1200ms;
            --duration: 260ms;
            --ease: cubic-bezier(.2, .8, .2, 1);
            --mx: 0px;
            --my: 0px;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            min-height: 100%;
        }

        body {
            overflow: hidden;
            background: var(--bg-deep);
            color: var(--text);
            font-family: var(--font-cn);
        }

        button {
            font: inherit;
        }

        .entry {
            position: relative;
            height: 100vh;
            min-height: 0;
            overflow: hidden;
            cursor: crosshair;
            isolation: isolate;
            background:
                linear-gradient(90deg, rgba(14, 4, 0, 0.5), transparent 21%, transparent 79%, rgba(14, 4, 0, 0.48)),
                linear-gradient(180deg, rgba(255, 184, 54, 0.04), transparent 38%, rgba(31, 8, 0, 0.28)),
                var(--scene-image) center center / cover no-repeat;
        }

        .entry::before,
        .entry::after {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 1;
        }

        .entry::before {
            background:
                radial-gradient(circle at calc(50% + var(--mx)) calc(45% + var(--my)), transparent 33%, rgba(46, 12, 0, 0.18) 74%, rgba(2, 1, 0, 0.58)),
                linear-gradient(90deg, rgba(8, 2, 0, 0.5), transparent 20%, transparent 78%, rgba(8, 2, 0, 0.54));
            mix-blend-mode: multiply;
            opacity: 0.58;
        }

        .entry::after {
            background:
                repeating-linear-gradient(180deg, rgba(255, 223, 166, 0.018) 0, rgba(255, 223, 166, 0.018) 1px, transparent 1px, transparent 4px),
                radial-gradient(circle at 52% 52%, transparent 52%, rgba(8, 2, 0, 0.52));
            opacity: 0.34;
        }

        .plate-drift {
            position: absolute;
            inset: -3%;
            pointer-events: none;
            z-index: 0;
            background: inherit;
            filter: saturate(1.04) contrast(1.04);
            transform: translate3d(calc(var(--mx) * -0.35), calc(var(--my) * -0.28), 0) scale(1.018);
            animation: lensDrift 18s var(--ease) infinite alternate;
        }

        .grain,
        .dust,
        .horizon {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 2;
        }

        .grain {
            opacity: 0.16;
            mix-blend-mode: overlay;
            background-image:
                radial-gradient(circle, rgba(255, 235, 190, .45) 0 1px, transparent 1.3px),
                radial-gradient(circle, rgba(46, 10, 0, .38) 0 1px, transparent 1.4px);
            background-size: 3px 3px, 5px 5px;
            animation: grainShift 900ms steps(2, end) infinite;
        }

        .dust {
            opacity: 0.34;
            mix-blend-mode: screen;
            background-image:
                radial-gradient(circle, rgba(255, 231, 166, .55) 0 1px, transparent 1.6px),
                radial-gradient(circle, rgba(255, 173, 74, .34) 0 1px, transparent 1.8px);
            background-size: 290px 290px, 430px 430px;
            background-position: 14% 18%, 82% 66%;
            animation: dustDrift 30s linear infinite;
        }

        .horizon {
            top: 45%;
            height: 32%;
            opacity: 0.18;
            filter: blur(11px);
            background:
                linear-gradient(90deg, transparent, rgba(255, 167, 51, 0.24) 32%, rgba(255, 211, 111, 0.16) 50%, rgba(255, 167, 51, 0.22) 68%, transparent);
            animation: horizonBreath 8s ease-in-out infinite alternate;
        }

        .sound-toggle {
            position: absolute;
            top: clamp(18px, 3.2vw, 42px);
            right: clamp(18px, 3.2vw, 42px);
            z-index: 6;
            display: inline-grid;
            grid-template-columns: auto 1fr;
            align-items: center;
            gap: 8px;
            min-width: 96px;
            padding: 7px 9px;
            border: 0;
            border-top: 1px solid var(--line);
            background: rgba(15, 5, 1, 0.22);
            color: var(--text-soft);
            letter-spacing: .12em;
            text-transform: uppercase;
            cursor: pointer;
            transition: color var(--duration) var(--ease), background var(--duration) var(--ease);
        }

        .sound-toggle:hover,
        .sound-toggle:focus-visible {
            color: var(--text);
            background: rgba(15, 5, 1, 0.34);
            outline: none;
        }

        .sound-toggle i {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: var(--amber);
            box-shadow: 0 0 18px rgba(216, 160, 77, .52);
        }

        .sound-toggle[aria-pressed="true"] i {
            background: rgba(245, 223, 183, .28);
            box-shadow: none;
        }

        .sound-toggle span {
            font: 600 .62rem/1 var(--font-mono);
        }

        .title-system {
            position: relative;
            z-index: 4;
            min-height: 100%;
            display: grid;
            align-content: end;
            justify-items: start;
            width: min(92vw, 680px);
            padding: 0 0 clamp(34px, 6.4vh, 64px) clamp(28px, 5.2vw, 72px);
            transform: translate3d(calc(var(--mx) * .18), calc(var(--my) * .12), 0);
        }

        .system-line {
            display: grid;
            grid-template-columns: auto 1fr;
            align-items: center;
            gap: 14px;
            margin-bottom: clamp(16px, 2.4vh, 24px);
            color: var(--text-faint);
            font: 600 .66rem/1.2 var(--font-mono);
            letter-spacing: .18em;
            text-transform: uppercase;
        }

        .mark {
            width: clamp(30px, 3.8vw, 48px);
            aspect-ratio: 1;
            display: block;
            filter: drop-shadow(0 0 18px rgba(216, 160, 77, .26));
            animation: markBreathe 5.5s ease-in-out infinite;
        }

        .overline {
            margin: 0 0 10px;
            color: var(--text-faint);
            font: 500 .66rem/1.2 var(--font-mono);
            letter-spacing: .28em;
            text-transform: uppercase;
        }

        .title {
            position: relative;
            margin: 0;
            padding-left: clamp(16px, 1.6vw, 24px);
            color: var(--text);
            font-family: var(--font-display);
            font-size: clamp(2.25rem, 6vw, 5.4rem);
            font-weight: 650;
            line-height: .9;
            letter-spacing: .075em;
            text-transform: uppercase;
            text-shadow:
                0 1px 0 rgba(255, 226, 166, .22),
                0 22px 48px rgba(49, 10, 0, .42);
        }

        .title::before {
            content: "";
            position: absolute;
            left: 0;
            top: 7%;
            bottom: 9%;
            width: 1px;
            background: linear-gradient(180deg, transparent, var(--line-strong), var(--amber-soft), transparent);
            box-shadow: 0 0 22px rgba(216, 160, 77, .3);
        }

        .title span {
            display: block;
        }

        .title span:last-child {
            color: rgba(245, 223, 183, .76);
            font-weight: 500;
        }

        .quote {
            position: relative;
            margin: clamp(12px, 1.8vh, 18px) 0 0 clamp(16px, 1.6vw, 24px);
            padding: 8px 13px 9px;
            color: rgba(255, 234, 196, .82);
            font: 700 clamp(.62rem, .94vw, .86rem)/1 var(--font-mono);
            letter-spacing: .23em;
            text-transform: uppercase;
            background:
                linear-gradient(90deg, rgba(255, 191, 91, .08), rgba(22, 7, 1, .35) 38%, transparent);
            border-left: 1px solid rgba(255, 215, 146, .32);
            box-shadow: -20px 0 42px rgba(46, 10, 0, .12);
        }

        .start-cue {
            display: grid;
            grid-template-columns: auto auto auto;
            align-items: center;
            gap: 10px;
            margin: clamp(18px, 3vh, 30px) 0 0 clamp(16px, 1.6vw, 24px);
            color: var(--text-soft);
            font: 700 clamp(.62rem, .9vw, .78rem)/1 var(--font-mono);
            letter-spacing: .22em;
            text-transform: uppercase;
        }

        .start-cue::before,
        .start-cue::after {
            content: "";
            width: 22px;
            height: 1px;
            background: var(--line);
        }

        .cursor {
            display: inline-block;
            width: 7px;
            height: 1.05em;
            margin-left: 3px;
            vertical-align: -.16em;
            background: var(--amber);
            animation: cursorPulse 1.1s steps(2, end) infinite;
        }

        .status {
            position: absolute;
            right: clamp(18px, 3vw, 38px);
            bottom: clamp(18px, 3vw, 38px);
            z-index: 5;
            color: rgba(245, 223, 183, .48);
            text-align: right;
            font: 500 .58rem/1.45 var(--font-mono);
            letter-spacing: .16em;
            text-transform: uppercase;
            text-shadow: 0 1px 0 rgba(30, 7, 0, .9);
        }

        .status strong {
            display: block;
            margin-bottom: 4px;
            color: rgba(255, 231, 180, .74);
            font: italic 650 clamp(.86rem, 1.12vw, 1.08rem)/1 Georgia, "Times New Roman", serif;
            letter-spacing: .06em;
            text-transform: none;
        }

        .entry.started {
            animation: entryOpen 1100ms var(--ease) forwards;
        }

        .entry.started .title-system {
            animation: titleWithdraw 1100ms var(--ease) forwards;
        }

        .entry.started .start-label {
            color: var(--text);
        }

        .entry.started::after {
            animation: scanClose 1100ms var(--ease) forwards;
        }

        @keyframes lensDrift {
            from { transform: translate3d(calc(var(--mx) * -.35), calc(var(--my) * -.28), 0) scale(1.018); }
            to { transform: translate3d(calc(var(--mx) * -.35), calc(var(--my) * -.28 - 8px), 0) scale(1.028); }
        }

        @keyframes grainShift {
            from { transform: translate3d(0, 0, 0); }
            to { transform: translate3d(-2px, 1px, 0); }
        }

        @keyframes dustDrift {
            from { transform: translate3d(0, 0, 0); }
            to { transform: translate3d(36px, -18px, 0); }
        }

        @keyframes horizonBreath {
            from { opacity: .12; transform: translateY(0) scaleX(1); }
            to { opacity: .23; transform: translateY(-5px) scaleX(1.04); }
        }

        @keyframes markBreathe {
            0%, 100% { opacity: .68; transform: rotate(0deg) scale(.98); }
            50% { opacity: 1; transform: rotate(4deg) scale(1.02); }
        }

        @keyframes cursorPulse {
            0%, 45% { opacity: 1; }
            46%, 100% { opacity: .18; }
        }

        @keyframes entryOpen {
            0% { filter: brightness(1) saturate(1); }
            45% { filter: brightness(1.32) saturate(1.08); }
            100% { filter: brightness(.08) saturate(.9); }
        }

        @keyframes titleWithdraw {
            to { opacity: 0; transform: translate3d(-16px, 8px, 0) scale(.985); }
        }

        @keyframes scanClose {
            to { opacity: .9; background: linear-gradient(180deg, rgba(255, 224, 160, .18), rgba(0, 0, 0, .95)); }
        }

        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation-duration: 1ms !important;
                animation-iteration-count: 1 !important;
                scroll-behavior: auto !important;
                transition-duration: 1ms !important;
            }
        }

        @media (max-width: 720px) {
            .sound-toggle {
                top: 16px;
                right: 16px;
            }

            .title-system {
                width: 100%;
                padding: 0 22px 78px;
            }

            .system-line {
                font-size: .56rem;
                letter-spacing: .12em;
            }

            .title {
                font-size: clamp(2rem, 12vw, 3.5rem);
            }

            .quote,
            .start-cue {
                margin-left: 16px;
            }

            .quote {
                max-width: calc(100vw - 60px);
                white-space: normal;
                letter-spacing: .16em;
            }

            .status {
                display: none;
            }
        }
    </style>
</head>
<body>
    <main class="entry" id="entry-screen" data-start-url="main.html">
        <div class="plate-drift" aria-hidden="true"></div>
        <div class="grain" aria-hidden="true"></div>
        <div class="dust" aria-hidden="true"></div>
        <div class="horizon" aria-hidden="true"></div>

        <button class="sound-toggle" id="sound-toggle" type="button" aria-pressed="false" aria-label="Toggle sound">
            <i aria-hidden="true"></i>
            <span id="sound-label">Sound on</span>
        </button>

        <section class="title-system" aria-label="Archive start screen">
            <div class="system-line">
                <svg class="mark" viewBox="0 0 96 96" aria-hidden="true">
                    <path fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" d="M48 9c13 15 22 23 33 25-8 11-17 17-28 19 8 7 14 16 19 28-13-4-23-10-30-19-7 9-17 15-30 19 5-12 11-21 19-28-11-2-20-8-28-19 11-2 20-10 33-25 3 8 6 15 12 21 6-6 9-13 12-21Z"/>
                    <path fill="none" stroke="currentColor" stroke-width="1.1" stroke-linecap="round" opacity=".5" d="M48 22v49M28 37c9 6 15 8 20 8s11-2 20-8"/>
                    <circle cx="48" cy="48" r="3.5" fill="currentColor"/>
                </svg>
                <span>Archive Node 051 / Personal Memory Terminal</span>
            </div>

            <p class="overline">Wisteria Wilson</p>
            <h1 class="title">
                <span>Wisteria</span>
                <span>Archive</span>
            </h1>
            <p class="quote" id="tagline">Just Like Tears In The Rain</p>

            <div class="start-cue" id="start-cue">
                <span class="start-label" id="start-text">Touch to start<span class="cursor" aria-hidden="true"></span></span>
            </div>
        </section>

        <div class="status" id="status-text">
            <strong>v0.2.0</strong>
            <div>Memory standby</div>
        </div>
    </main>

    <script>
        const entry = document.getElementById("entry-screen");
        const startText = document.getElementById("start-text");
        const statusText = document.getElementById("status-text");
        const soundToggle = document.getElementById("sound-toggle");
        const soundLabel = document.getElementById("sound-label");
        const storageKeys = {
            muted: "wisteria.audio.muted",
            volume: "wisteria.audio.volume"
        };

        let isStarting = false;
        let audioEngine = null;
        let isMuted = localStorage.getItem(storageKeys.muted) === "true";
        let savedVolume = Number.parseFloat(localStorage.getItem(storageKeys.volume) || "0.34");
        savedVolume = Number.isFinite(savedVolume) ? Math.min(Math.max(savedVolume, 0), 0.7) : 0.34;

        class AmbientEngine {
            constructor(volume) {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) {
                    throw new Error("Web Audio is not supported");
                }

                this.context = new AudioContext();
                this.master = this.context.createGain();
                this.master.gain.value = 0;
                this.master.connect(this.context.destination);
                this.volume = volume;
                this.started = false;
            }

            createNoiseBuffer() {
                const length = this.context.sampleRate * 3;
                const buffer = this.context.createBuffer(1, length, this.context.sampleRate);
                const data = buffer.getChannelData(0);
                for (let index = 0; index < length; index += 1) {
                    data[index] = (Math.random() * 2 - 1) * 0.32;
                }
                return buffer;
            }

            async start() {
                if (this.context.state === "suspended") {
                    await this.context.resume();
                }

                if (!this.started) {
                    const low = this.context.createOscillator();
                    const lowGain = this.context.createGain();
                    low.type = "sine";
                    low.frequency.value = 44;
                    lowGain.gain.value = 0.18;
                    low.connect(lowGain).connect(this.master);

                    const harmonic = this.context.createOscillator();
                    const harmonicGain = this.context.createGain();
                    harmonic.type = "triangle";
                    harmonic.frequency.value = 88;
                    harmonic.detune.value = -7;
                    harmonicGain.gain.value = 0.05;
                    harmonic.connect(harmonicGain).connect(this.master);

                    const noise = this.context.createBufferSource();
                    const filter = this.context.createBiquadFilter();
                    const noiseGain = this.context.createGain();
                    noise.buffer = this.createNoiseBuffer();
                    noise.loop = true;
                    filter.type = "lowpass";
                    filter.frequency.value = 520;
                    noiseGain.gain.value = 0.032;
                    noise.connect(filter).connect(noiseGain).connect(this.master);

                    low.start();
                    harmonic.start();
                    noise.start();
                    this.started = true;
                }

                this.fadeTo(this.volume, 1.4);
            }

            fadeTo(value, seconds = 0.6) {
                const now = this.context.currentTime;
                this.master.gain.cancelScheduledValues(now);
                this.master.gain.setValueAtTime(this.master.gain.value, now);
                this.master.gain.linearRampToValueAtTime(value, now + seconds);
            }
        }

        function updateSoundToggle() {
            soundToggle.setAttribute("aria-pressed", String(isMuted));
            soundLabel.textContent = isMuted ? "Sound off" : "Sound on";
        }

        function getAudioEngine() {
            if (!audioEngine) {
                audioEngine = new AmbientEngine(savedVolume);
            }
            return audioEngine;
        }

        async function requestAudioStart() {
            if (isMuted || window.matchMedia("(prefers-reduced-motion: reduce)").matches) {
                sessionStorage.setItem("wisteria.audio.requested", "0");
                return;
            }

            try {
                await getAudioEngine().start();
                sessionStorage.setItem("wisteria.audio.requested", "1");
            } catch (error) {
                sessionStorage.setItem("wisteria.audio.requested", "0");
            }
        }

        function toggleSound(event) {
            event.stopPropagation();
            isMuted = !isMuted;
            localStorage.setItem(storageKeys.muted, String(isMuted));
            updateSoundToggle();

            if (audioEngine && audioEngine.started) {
                audioEngine.fadeTo(isMuted ? 0 : savedVolume, 0.5);
            }
        }

        async function beginStartup() {
            if (isStarting) {
                return;
            }

            isStarting = true;
            entry.classList.add("started");
            startText.textContent = "Initializing";
            statusText.innerHTML = "<strong>v0.2.0</strong><div>Memory online</div>";

            await requestAudioStart();

            const startUrl = entry.dataset.startUrl && entry.dataset.startUrl.trim();
            window.setTimeout(() => {
                window.location.href = startUrl || "main.html";
            }, 1120);
        }

        function handlePointerMove(event) {
            const x = (event.clientX / window.innerWidth - 0.5) * 18;
            const y = (event.clientY / window.innerHeight - 0.5) * 14;
            entry.style.setProperty("--mx", `${x}px`);
            entry.style.setProperty("--my", `${y}px`);
        }

        updateSoundToggle();
        soundToggle.addEventListener("click", toggleSound);
        entry.addEventListener("click", beginStartup);
        window.addEventListener("pointermove", handlePointerMove);
        window.addEventListener("keydown", (event) => {
            if (event.key === "Enter" || event.key === " ") {
                event.preventDefault();
                beginStartup();
            }
        });
    </script>
</body>
</html>
