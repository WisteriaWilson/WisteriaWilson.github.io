<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wisteria Personal Archive</title>
    <link rel="icon" href="assets/wisteria-mark.svg" type="image/svg+xml">
    <style>
        :root {
            --font-cn: "HarmonyOS Sans SC", "MiSans", "Source Han Sans SC", "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
            --font-display: "Space Grotesk", "IBM Plex Sans", "Rajdhani", "DIN Alternate", "Bahnschrift", sans-serif;
            --font-mono: "IBM Plex Mono", "Cascadia Mono", "SFMono-Regular", Consolas, monospace;
            --bg: #080706;
            --bg-deep: #030303;
            --surface: rgba(19, 17, 14, 0.74);
            --surface-soft: rgba(31, 27, 22, 0.48);
            --surface-elevated: rgba(42, 35, 27, 0.62);
            --text: #efe4ce;
            --text-soft: rgba(239, 228, 206, 0.72);
            --text-faint: rgba(239, 228, 206, 0.42);
            --text-ghost: rgba(239, 228, 206, 0.24);
            --amber: #cfa05c;
            --amber-soft: rgba(207, 160, 92, 0.42);
            --amber-faint: rgba(207, 160, 92, 0.13);
            --rust: #9d4a34;
            --rust-soft: rgba(157, 74, 52, 0.22);
            --blue: #8794b8;
            --blue-soft: rgba(135, 148, 184, 0.16);
            --green: #76bd93;
            --edge: rgba(237, 209, 162, 0.12);
            --edge-mid: rgba(237, 209, 162, 0.22);
            --edge-hot: rgba(237, 209, 162, 0.42);
            --shadow: 0 28px 80px rgba(0, 0, 0, 0.48);
            --shadow-soft: 0 12px 34px rgba(0, 0, 0, 0.28);
            --radius-sm: 8px;
            --radius-md: 16px;
            --radius-lg: 26px;
            --gap: clamp(12px, 1.2vw, 18px);
            --duration: 230ms;
            --duration-slow: 780ms;
            --ease: cubic-bezier(.2, .8, .2, 1);
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            min-height: 100%;
        }

        body {
            overflow: hidden;
            background:
                radial-gradient(circle at 15% 16%, rgba(207, 160, 92, 0.08), transparent 24%),
                radial-gradient(circle at 82% 76%, rgba(135, 148, 184, 0.07), transparent 28%),
                linear-gradient(145deg, #0e0b08, #050504 62%, #0a0806);
            color: var(--text);
            font-family: var(--font-cn);
        }

        button,
        input {
            font: inherit;
        }

        button {
            color: inherit;
        }

        .archive-shell {
            position: relative;
            height: 100vh;
            min-height: 0;
            display: grid;
            grid-template-rows: 58px minmax(0, 1fr) clamp(224px, 26vh, 260px);
            gap: var(--gap);
            padding: clamp(14px, 1.4vw, 22px);
            overflow: hidden;
            isolation: isolate;
        }

        .archive-shell::before,
        .archive-shell::after {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
        }

        .archive-shell::before {
            z-index: 0;
            background:
                linear-gradient(90deg, rgba(255,255,255,.018) 1px, transparent 1px),
                linear-gradient(180deg, rgba(255,255,255,.014) 1px, transparent 1px),
                radial-gradient(circle at 78% 8%, rgba(207,160,92,.09), transparent 28%);
            background-size: 96px 96px, 96px 96px, auto;
            mask-image: radial-gradient(circle at 52% 54%, black 0 56%, transparent 92%);
        }

        .archive-shell::after {
            z-index: 20;
            opacity: .36;
            background:
                radial-gradient(circle at center, transparent 58%, rgba(0,0,0,.58)),
                repeating-linear-gradient(180deg, rgba(255,255,255,.018) 0 1px, transparent 1px 4px);
        }

        .orbit {
            position: absolute;
            right: -18vw;
            top: -26vw;
            z-index: 0;
            width: 58vw;
            aspect-ratio: 1;
            pointer-events: none;
            border: 1px solid rgba(207,160,92,.06);
            border-radius: 50%;
            animation: slowSpin 72s linear infinite;
        }

        .orbit::before,
        .orbit::after {
            content: "";
            position: absolute;
            inset: 18%;
            border: 1px solid rgba(135,148,184,.07);
            border-radius: inherit;
        }

        .orbit::after {
            inset: 38%;
            border-color: rgba(207,160,92,.06);
        }

        .topbar,
        .stage,
        .lower-deck {
            position: relative;
            z-index: 2;
        }

        .topbar {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            align-items: center;
            gap: var(--gap);
        }

        .brand {
            display: inline-grid;
            grid-template-columns: auto minmax(0, 1fr);
            align-items: center;
            gap: 12px;
            width: fit-content;
            color: var(--text);
            text-decoration: none;
        }

        .brand svg {
            width: 38px;
            color: var(--amber);
            filter: drop-shadow(0 0 16px rgba(207,160,92,.22));
            animation: markBreath 7s ease-in-out infinite;
        }

        .brand-copy {
            display: grid;
            gap: 3px;
        }

        .brand-copy strong {
            color: rgba(245,230,200,.92);
            font: 650 .84rem/1 var(--font-display);
            letter-spacing: .12em;
            text-transform: uppercase;
        }

        .brand-copy span,
        .readout,
        .label {
            color: var(--text-faint);
            font: 600 .56rem/1 var(--font-mono);
            letter-spacing: .16em;
            text-transform: uppercase;
        }

        .top-tools {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .readout {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .readout span + span::before {
            content: "";
            display: inline-block;
            width: 2px;
            height: 2px;
            margin-right: 12px;
            border-radius: 50%;
            background: var(--amber-soft);
            vertical-align: middle;
        }

        .icon-button {
            display: grid;
            place-items: center;
            width: 34px;
            height: 34px;
            border: 1px solid rgba(237,209,162,.1);
            border-radius: 999px;
            background: rgba(255,255,255,.018);
            color: var(--text-faint);
            cursor: pointer;
            transition: color var(--duration) var(--ease), border-color var(--duration) var(--ease), background var(--duration) var(--ease);
        }

        .icon-button:hover,
        .icon-button:focus-visible {
            color: var(--text);
            border-color: var(--edge-hot);
            background: rgba(255,255,255,.04);
            outline: none;
        }

        .icon-button svg,
        .nav-button svg,
        .player-button svg {
            width: 17px;
            height: 17px;
            fill: none;
            stroke: currentColor;
            stroke-width: 1.7;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .stage {
            min-height: 0;
            display: grid;
            grid-template-columns: minmax(0, 1fr);
        }

        .stage-card {
            position: relative;
            min-height: 0;
            display: grid;
            grid-template-rows: auto minmax(0, 1fr);
            overflow: hidden;
            border-radius: var(--radius-lg);
            border: 1px solid var(--edge);
            background:
                radial-gradient(circle at 60% 42%, var(--section-glow, rgba(135,148,184,.12)), transparent 34%),
                linear-gradient(145deg, rgba(255,255,255,.035), transparent 42%),
                linear-gradient(180deg, rgba(34,29,23,.72), rgba(8,8,7,.88));
            box-shadow: var(--shadow);
        }

        .stage-card::before {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            border-radius: inherit;
            background:
                linear-gradient(90deg, rgba(237,209,162,.34), transparent 12%, transparent 82%, rgba(135,148,184,.13)),
                linear-gradient(180deg, rgba(255,255,255,.055), transparent 20%);
            mask:
                linear-gradient(#000 0 0) content-box,
                linear-gradient(#000 0 0);
            -webkit-mask:
                linear-gradient(#000 0 0) content-box,
                linear-gradient(#000 0 0);
            padding: 1px;
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: .52;
        }

        .stage-head {
            display: grid;
            grid-template-columns: auto minmax(0, 1fr) auto;
            align-items: center;
            gap: clamp(12px, 1.4vw, 22px);
            padding: clamp(14px, 1.5vw, 20px) clamp(16px, 1.9vw, 26px);
            border-bottom: 1px solid rgba(237,209,162,.08);
            background:
                linear-gradient(90deg, rgba(157,74,52,.18), transparent 62%),
                rgba(255,255,255,.012);
        }

        .section-number {
            color: rgba(245,228,206,.9);
            font: 750 clamp(2rem, 4vw, 3.9rem)/.82 var(--font-display);
            letter-spacing: -.05em;
        }

        .section-meta {
            min-width: 0;
            display: grid;
            gap: 6px;
        }

        .section-meta .label {
            color: var(--amber);
        }

        .section-meta h1 {
            margin: 0;
            color: rgba(245,228,206,.94);
            font: 740 clamp(1.5rem, 3.1vw, 3.2rem)/.98 var(--font-display);
            letter-spacing: .04em;
            text-transform: uppercase;
        }

        .section-status {
            padding: 7px 10px;
            border: 1px solid rgba(237,209,162,.12);
            color: var(--text-faint);
            font: 700 .56rem/1 var(--font-mono);
            letter-spacing: .12em;
            text-transform: uppercase;
            background: rgba(255,255,255,.018);
        }

        .stage-body {
            position: relative;
            min-height: 0;
            padding: clamp(16px, 2vw, 28px);
        }

        .stage-body::before {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            opacity: .44;
            background:
                repeating-linear-gradient(112deg, transparent 0 58px, rgba(255,255,255,.026) 59px 61px),
                radial-gradient(circle at 62% 50%, rgba(135,148,184,.11), transparent 26%);
        }

        .view-panel {
            position: relative;
            z-index: 1;
            height: 100%;
            min-height: 0;
            animation: viewIn var(--duration-slow) var(--ease) both;
        }

        .view-panel h2,
        .view-panel h3,
        .view-panel p {
            margin-top: 0;
        }

        .view-panel p {
            color: var(--text-soft);
            line-height: 1.75;
        }

        .about-layout {
            height: 100%;
            min-height: 0;
            display: grid;
            grid-template-columns: minmax(0, .98fr) minmax(240px, .42fr);
            gap: clamp(20px, 3vw, 44px);
            align-items: center;
        }

        .intro-copy {
            max-width: 66ch;
        }

        .kicker {
            display: inline-flex;
            margin-bottom: 12px;
            padding: 5px 9px;
            border-left: 1px solid var(--amber-soft);
            color: var(--amber);
            font: 700 .58rem/1 var(--font-mono);
            letter-spacing: .18em;
            text-transform: uppercase;
            background: linear-gradient(90deg, rgba(207,160,92,.09), transparent);
        }

        .hero-title {
            margin: 0;
            color: rgba(245,228,206,.96);
            font: 760 clamp(2.2rem, 5vw, 5rem)/.96 var(--font-display);
            letter-spacing: .04em;
            text-transform: uppercase;
        }

        .lead {
            max-width: 50ch;
            margin: 18px 0 0;
            color: var(--text-soft);
            font-size: clamp(.92rem, 1.05vw, 1.05rem);
        }

        .tag-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 22px;
        }

        .tag,
        .metadata span,
        .project-chip,
        .contact-tag {
            display: inline-flex;
            align-items: center;
            width: fit-content;
            min-height: 26px;
            padding: 6px 9px;
            border: 1px solid rgba(237,209,162,.1);
            border-radius: 999px;
            background: rgba(0,0,0,.14);
            color: var(--text-faint);
            font: 600 .58rem/1 var(--font-mono);
            letter-spacing: .06em;
        }

        .portrait-frame {
            align-self: stretch;
            min-height: clamp(202px, 28vh, 248px);
            position: relative;
            display: grid;
            place-items: center;
            border: 1px solid rgba(237,209,162,.12);
            background:
                radial-gradient(circle at 50% 40%, rgba(135,148,184,.18), transparent 36%),
                linear-gradient(180deg, rgba(0,0,0,.08), rgba(0,0,0,.28));
            overflow: hidden;
        }

        .portrait-frame::before {
            content: "";
            position: absolute;
            inset: 14px;
            border: 1px solid rgba(237,209,162,.08);
            clip-path: polygon(0 0, 42% 0, 42% 1px, 0 1px, 0 100%, 1px 100%, 1px 0);
        }

        .portrait-core {
            width: min(68%, 220px);
            aspect-ratio: .72;
            border-radius: 42% 42% 18% 18%;
            background:
                linear-gradient(180deg, rgba(245,228,206,.2), transparent 34%),
                radial-gradient(circle at 50% 22%, rgba(245,228,206,.62) 0 15%, transparent 16%),
                linear-gradient(180deg, rgba(135,148,184,.2), rgba(27,25,24,.9));
            filter: grayscale(.35) saturate(.7);
            box-shadow: 0 28px 70px rgba(0,0,0,.4);
            opacity: .84;
        }

        .metadata {
            position: absolute;
            left: 18px;
            right: 18px;
            bottom: 18px;
            display: flex;
            flex-wrap: wrap;
            gap: 7px;
        }

        .works-layout {
            height: 100%;
            display: grid;
            grid-template-columns: minmax(0, .88fr) minmax(360px, .62fr);
            gap: clamp(18px, 2.4vw, 34px);
            min-height: 0;
        }

        .featured-work {
            position: relative;
            min-height: 0;
            padding: clamp(18px, 2.2vw, 30px);
            border-left: 1px solid var(--edge-mid);
            background:
                radial-gradient(circle at 78% 28%, rgba(207,160,92,.13), transparent 24%),
                rgba(0,0,0,.11);
            overflow: hidden;
        }

        .featured-work h2 {
            margin: 0;
            max-width: 12ch;
            color: var(--text);
            font: 760 clamp(2rem, 4.2vw, 4.4rem)/.94 var(--font-display);
            letter-spacing: .03em;
            text-transform: uppercase;
        }

        .featured-work p {
            max-width: 46ch;
            margin: 18px 0 0;
        }

        .project-index {
            display: grid;
            align-content: center;
            gap: 10px;
            min-height: 0;
        }

        .project-row {
            appearance: none;
            width: 100%;
            display: grid;
            grid-template-columns: auto minmax(0, 1fr) auto;
            gap: 12px;
            align-items: center;
            padding: 13px 0;
            border: 0;
            border-bottom: 1px solid rgba(237,209,162,.09);
            background: transparent;
            color: var(--text-soft);
            text-align: left;
            cursor: pointer;
        }

        .project-row:hover,
        .project-row:focus-visible,
        .project-row.active {
            color: var(--text);
            outline: none;
        }

        .project-row strong {
            font: 700 1rem/1.1 var(--font-cn);
        }

        .project-row small,
        .project-row span {
            color: var(--text-faint);
            font: 600 .56rem/1 var(--font-mono);
            letter-spacing: .12em;
            text-transform: uppercase;
        }

        .hobby-layout {
            height: 100%;
            display: grid;
            grid-template-columns: minmax(0, .7fr) minmax(320px, .5fr);
            gap: clamp(20px, 3vw, 46px);
            align-items: center;
        }

        .interest-map {
            position: relative;
            min-height: 0;
            height: clamp(218px, 31vh, 300px);
            align-self: center;
            border: 1px solid rgba(237,209,162,.09);
            border-radius: 48%;
            background:
                repeating-radial-gradient(circle, transparent 0 52px, rgba(237,209,162,.08) 53px 54px),
                conic-gradient(from 20deg, rgba(207,160,92,.15), transparent 22%, rgba(135,148,184,.14), transparent 62%, rgba(157,74,52,.12));
        }

        .interest-node {
            position: absolute;
            transform: translate(-50%, -50%);
            color: var(--text);
            font: 700 .72rem/1 var(--font-mono);
            letter-spacing: .12em;
            text-transform: uppercase;
        }

        .interest-node::before {
            content: "";
            display: block;
            width: 9px;
            height: 9px;
            margin-bottom: 7px;
            border-radius: 50%;
            background: var(--amber);
            box-shadow: 0 0 18px rgba(207,160,92,.42);
        }

        .habit-stack {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px 14px;
            align-content: center;
        }

        .habit-item {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 7px 12px;
            align-items: center;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(237,209,162,.09);
        }

        .habit-item strong {
            color: var(--text);
        }

        .habit-item p {
            margin: 0;
            font-size: .88rem;
            line-height: 1.46;
        }

        .habit-bar {
            grid-column: 1 / -1;
            height: 5px;
            border-radius: 999px;
            overflow: hidden;
            background: rgba(255,255,255,.06);
        }

        .habit-bar i {
            display: block;
            width: var(--value);
            height: 100%;
            background: linear-gradient(90deg, var(--blue), var(--amber));
        }

        .music-layout,
        .contact-layout {
            height: 100%;
            display: grid;
            grid-template-columns: minmax(0, .72fr) minmax(340px, .5fr);
            gap: clamp(18px, 2.8vw, 42px);
            align-items: center;
        }

        .mood-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
        }

        .mood-card,
        .contact-card {
            padding: 16px;
            border: 1px solid rgba(237,209,162,.09);
            background: rgba(0,0,0,.12);
        }

        .mood-card strong,
        .contact-card strong {
            display: block;
            color: var(--text);
            font: 720 1.02rem/1.2 var(--font-display);
        }

        .mood-card p,
        .contact-card p {
            margin: 8px 0 0;
            font-size: .82rem;
        }

        .contact-list {
            display: grid;
            gap: 10px;
        }

        .copy-button {
            appearance: none;
            width: 100%;
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 12px;
            align-items: center;
            padding: 12px 0;
            border: 0;
            border-bottom: 1px solid rgba(237,209,162,.09);
            background: transparent;
            color: var(--text-soft);
            cursor: pointer;
            text-align: left;
        }

        .copy-button:hover,
        .copy-button:focus-visible {
            color: var(--text);
            outline: none;
        }

        .copy-button code {
            color: inherit;
            font: 600 .78rem/1.2 var(--font-mono);
        }

        .lower-deck {
            display: grid;
            grid-template-columns: minmax(410px, .72fr) minmax(0, 1fr) minmax(430px, .8fr);
            grid-template-areas: "player status nav";
            gap: var(--gap);
            min-height: 0;
        }

        .module-nav,
        .player,
        .feedback {
            position: relative;
            min-height: 0;
            border: 1px solid var(--edge);
            border-radius: var(--radius-md);
            background:
                linear-gradient(145deg, rgba(255,255,255,.032), transparent 38%),
                rgba(17,15,12,.74);
            box-shadow: var(--shadow-soft);
            overflow: hidden;
        }

        .player {
            grid-area: player;
            display: grid;
            grid-template-columns: 78px minmax(0, 1fr);
            grid-template-rows: auto minmax(0, 1fr) auto auto;
            gap: 8px 12px;
            padding: 14px;
        }

        .cover {
            grid-row: 1 / -1;
            position: relative;
            align-self: stretch;
            min-height: 106px;
            border: 1px solid rgba(237,209,162,.1);
            background:
                radial-gradient(circle at 50% 50%, rgba(245,228,206,.8) 0 3px, transparent 4px),
                repeating-radial-gradient(circle, transparent 0 16px, rgba(207,160,92,.22) 17px 18px),
                conic-gradient(from 0deg, rgba(207,160,92,.32), rgba(135,148,184,.12), rgba(157,74,52,.18), rgba(207,160,92,.32));
            overflow: hidden;
        }

        .cover.playing {
            animation: slowSpin 22s linear infinite;
        }

        .track-meta {
            grid-column: 2;
            grid-row: 1;
            min-width: 0;
            display: grid;
            gap: 6px;
            align-items: start;
        }

        .track-meta h2 {
            margin: 3px 0 2px;
            overflow: hidden;
            color: var(--text);
            font: 720 clamp(.92rem, 1.04vw, 1.05rem)/1.05 var(--font-display);
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .track-meta p {
            overflow: hidden;
            margin: 0;
            color: var(--text-faint);
            font: 600 .52rem/1.18 var(--font-mono);
            letter-spacing: .1em;
            text-overflow: ellipsis;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .controls {
            display: flex;
            gap: 6px;
            align-items: center;
            justify-content: flex-start;
        }

        .player-button {
            display: grid;
            place-items: center;
            width: 28px;
            height: 28px;
            border: 1px solid rgba(237,209,162,.12);
            border-radius: 999px;
            background: rgba(255,255,255,.018);
            color: var(--text-soft);
            cursor: pointer;
        }

        .player-button.primary {
            width: 34px;
            height: 34px;
            color: var(--text);
            border-color: var(--edge-mid);
            background: rgba(207,160,92,.08);
        }

        .player-button.active {
            color: var(--amber);
            border-color: var(--amber-soft);
        }

        .player-button:hover,
        .player-button:focus-visible {
            color: var(--text);
            border-color: var(--edge-hot);
            outline: none;
        }

        .progress-line {
            grid-column: 2;
            grid-row: 3;
            display: grid;
            grid-template-columns: auto minmax(0, 1fr) auto;
            gap: 8px;
            align-items: center;
            color: var(--text-faint);
            font: 600 .55rem/1 var(--font-mono);
        }

        .progress-line input,
        .volume-line input {
            width: 100%;
            accent-color: var(--amber);
        }

        .lyrics-window {
            grid-column: 2;
            grid-row: 2;
            min-height: 38px;
            max-height: 58px;
            overflow: auto;
            padding-right: 4px;
            mask-image: linear-gradient(180deg, transparent, black 18%, black 80%, transparent);
            scrollbar-width: thin;
        }

        .lyrics-window ol {
            margin: 0;
            padding: 4px 0;
            list-style: none;
        }

        .lyrics-window li {
            color: var(--text-ghost);
            font-size: .7rem;
            line-height: 1.5;
            transition: color var(--duration) var(--ease), transform var(--duration) var(--ease);
        }

        .lyrics-window li.active {
            color: var(--text);
            transform: translateX(5px);
        }

        .volume-line {
            grid-column: 2;
            grid-row: 4;
            display: grid;
            grid-template-columns: auto minmax(0, 1fr) auto;
            gap: 8px;
            align-items: center;
            color: var(--text-faint);
            font: 600 .52rem/1 var(--font-mono);
            letter-spacing: .08em;
        }

        .feedback {
            grid-area: status;
            padding: 14px;
            display: grid;
            align-content: center;
            gap: 8px;
        }

        .feedback strong {
            color: var(--text);
            font: 720 1rem/1.1 var(--font-display);
        }

        .feedback p {
            margin: 0;
            max-width: 44ch;
            color: var(--text-faint);
            font-size: .76rem;
            line-height: 1.55;
        }

        .module-nav {
            grid-area: nav;
            display: grid;
            gap: 10px;
            padding: 14px;
        }

        .nav-track {
            display: grid;
            grid-template-columns: repeat(5, minmax(0, 1fr));
            gap: 7px;
            min-height: 0;
        }

        .nav-button {
            appearance: none;
            position: relative;
            display: grid;
            align-content: center;
            justify-items: start;
            gap: 5px;
            min-height: 0;
            padding: 10px;
            border: 0;
            border-left: 1px solid rgba(237,209,162,.1);
            background: transparent;
            color: var(--text-faint);
            cursor: pointer;
            overflow: hidden;
            transition: color var(--duration) var(--ease), background var(--duration) var(--ease), transform var(--duration) var(--ease);
        }

        .nav-button::before {
            content: "";
            position: absolute;
            left: 0;
            top: 8px;
            width: 1px;
            height: 22px;
            background: var(--amber-soft);
            transform: scaleY(0);
            transform-origin: top;
            transition: transform var(--duration) var(--ease);
        }

        .nav-button:hover,
        .nav-button:focus-visible {
            color: var(--text);
            background: rgba(255,255,255,.018);
            outline: none;
        }

        .nav-button:focus-visible,
        .copy-button:focus-visible,
        .player-button:focus-visible,
        .icon-button:focus-visible {
            box-shadow: 0 0 0 2px rgba(207,160,92,.28);
        }

        .nav-button[aria-current="page"] {
            color: var(--text);
            background:
                linear-gradient(180deg, rgba(207,160,92,.08), transparent),
                rgba(255,255,255,.02);
        }

        .nav-button[aria-current="page"]::before {
            transform: scaleY(1);
        }

        .nav-button svg {
            opacity: .78;
        }

        .nav-index {
            color: var(--amber);
            font: 700 .55rem/1 var(--font-mono);
            letter-spacing: .12em;
        }

        .nav-label {
            font: 760 .88rem/1.05 var(--font-cn);
        }

        .nav-sub {
            color: var(--text-ghost);
            font: 600 .48rem/1 var(--font-mono);
            letter-spacing: .14em;
            text-transform: uppercase;
        }

        .sr-live {
            position: absolute;
            width: 1px;
            height: 1px;
            overflow: hidden;
            clip: rect(0 0 0 0);
            white-space: nowrap;
        }

        @keyframes slowSpin {
            to { transform: rotate(360deg); }
        }

        @keyframes markBreath {
            0%, 100% { opacity: .72; transform: rotate(0deg) scale(.98); }
            50% { opacity: 1; transform: rotate(3deg) scale(1.02); }
        }

        @keyframes viewIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation-duration: 1ms !important;
                animation-iteration-count: 1 !important;
                scroll-behavior: auto !important;
                transition-duration: 1ms !important;
            }
        }

        @media (max-width: 1180px) {
            body {
                overflow: auto;
            }

            .archive-shell {
                height: auto;
                min-height: 100vh;
                grid-template-rows: auto auto auto;
            }

            .about-layout,
            .works-layout,
            .hobby-layout,
            .music-layout,
            .contact-layout,
            .lower-deck {
                grid-template-columns: 1fr;
                grid-template-areas: none;
            }

            .player,
            .feedback,
            .module-nav {
                grid-area: auto;
            }

            .habit-stack {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 720px) {
            .archive-shell {
                padding: 12px;
                gap: 12px;
                padding-bottom: 96px;
            }

            .topbar,
            .stage-head {
                grid-template-columns: 1fr;
            }

            .top-tools {
                justify-content: space-between;
            }

            .stage-body {
                padding: 18px;
            }

            .hero-title,

                font-size: clamp(2rem, 12vw, 3.4rem);
            }

            .portrait-frame {
                min-height: 220px;
            }

            .nav-track {
                position: fixed;
                z-index: 30;
                left: 12px;
                right: 12px;
                bottom: 12px;
                grid-template-columns: repeat(5, 1fr);
                padding: 8px;

            .nav-button {

                padding: 8px 4px;
                border-left: 0;
            }

            .nav-button svg,

            }

            .player {
                grid-template-columns: 64px minmax(0, 1fr);
            }

            .lyrics-window {
                max-height: 64px;
            }
        }
    </style>

                artist: "Wisteria Archive Ensemble",
                src: "assets/audio/rain-memory.wav",
                lrc: `[00:00.00]Just like tears in the rain\n[00:07.00]A distant figure crosses the orange field\n[00:15.00]The horizon keeps its own archive\n[00:23.00]Names dissolve, but the weather remains\n[00:32.00]Memory playback continues`
            },
            {
                title: "Open Channel",
                artist: "Signal Desk",
                src: "assets/audio/open-channel.wav",
                lrc: `[00:00.00]Open channel standing by\n[00:05.00]Coordinates verified\n[00:11.00]Public contact remains available\n[00:19.00]Leave a message at the edge of the system\n[00:27.00]Connection available`
            }
        ];

        const icons = {
            play: `<path d="M8 5v14l11-7-11-7Z"/>`,
            pause: `<path d="M8 5v14"/><path d="M16 5v14"/>`
        };

        const elements = {
            shell: document.getElementById("archive-shell"),
            number: document.getElementById("section-number"),
            label: document.getElementById("section-label"),
            title: document.getElementById("section-title"),
            status: document.getElementById("section-status"),
            view: document.getElementById("view-panel"),
            feedbackTitle: document.getElementById("feedback-title"),
            feedbackText: document.getElementById("feedback-text"),
            sectionReadout: document.getElementById("section-readout"),
            clock: document.getElementById("clock-readout"),
            trackReadout: document.getElementById("track-readout"),
            live: document.getElementById("live-region"),
            audio: document.getElementById("audio-core"),
            cover: document.getElementById("cover-art"),
            trackTitle: document.getElementById("track-title"),
            trackArtist: document.getElementById("track-artist"),
            playButton: document.getElementById("play-button"),
            playIcon: document.getElementById("play-icon"),
            prevButton: document.getElementById("prev-button"),
            nextButton: document.getElementById("next-button"),
            loopButton: document.getElementById("loop-button"),
            shuffleButton: document.getElementById("shuffle-button"),
            topSoundToggle: document.getElementById("top-sound-toggle"),
            progress: document.getElementById("progress-control"),
            currentTime: document.getElementById("current-time"),
            duration: document.getElementById("duration-time"),
            volume: document.getElementById("volume-control"),
            volumeValue: document.getElementById("volume-value"),
            lyricsWindow: document.getElementById("lyrics-window"),
            lyricsList: document.getElementById("lyrics-list")
        };

        const navButtons = Array.from(document.querySelectorAll(".nav-button"));
        const storage = {
            track: "wisteria.player.track",
            time: "wisteria.player.time",
            volume: "wisteria.audio.volume",
            muted: "wisteria.audio.muted",
            loop: "wisteria.player.loop",
            shuffle: "wisteria.player.shuffle"
        };

        let currentSection = "about";
        let trackIndex = Number.parseInt(localStorage.getItem(storage.track) || "0", 10);
        trackIndex = Number.isFinite(trackIndex) ? Math.min(Math.max(trackIndex, 0), tracks.length - 1) : 0;
        let currentLyrics = [];
        let currentLyricIndex = -1;
        let manualLyricsUntil = 0;
        let isSeeking = false;
        let loopMode = localStorage.getItem(storage.loop) || "all";
        let shuffle = localStorage.getItem(storage.shuffle) === "true";

        function formatTime(value) {
            if (!Number.isFinite(value)) return "00:00";
            const minutes = Math.floor(value / 60);
            const seconds = Math.floor(value % 60);
            return `${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}`;
        }

        function parseLrc(lrc) {
            return String(lrc).split(/\r?\n/).map((line) => {
                const match = line.match(/^\[(\d+):(\d+(?:\.\d+)?)\](.*)$/);
                if (!match) return null;
                return {
                    time: Number(match[1]) * 60 + Number(match[2]),
                    text: match[3].trim()
                };
            }).filter(Boolean);
        }

        function renderLyrics() {
            elements.lyricsList.innerHTML = currentLyrics.map((line, index) => `<li data-lyric="${index}">${line.text}</li>`).join("");
            currentLyricIndex = -1;
        }

        function updateLyricHighlight() {
            const time = elements.audio.currentTime;
            let nextIndex = currentLyrics.findIndex((line, index) => {
                const next = currentLyrics[index + 1];
                return time >= line.time && (!next || time < next.time);
            });
            if (nextIndex < 0) nextIndex = 0;
            if (nextIndex === currentLyricIndex) return;
            currentLyricIndex = nextIndex;
            const items = Array.from(elements.lyricsList.querySelectorAll("li"));
            items.forEach((item, index) => item.classList.toggle("active", index === currentLyricIndex));
            if (Date.now() > manualLyricsUntil && items[currentLyricIndex]) {
                const target = items[currentLyricIndex];
                const top = target.offsetTop - (elements.lyricsWindow.clientHeight / 2) + (target.offsetHeight / 2);
                elements.lyricsWindow.scrollTo({
                    top: Math.max(0, top),
                    behavior: window.matchMedia("(prefers-reduced-motion: reduce)").matches ? "auto" : "smooth"
                });
            }
        }

        function loadTrack(index, restore = false) {
            trackIndex = (index + tracks.length) % tracks.length;
            const track = tracks[trackIndex];
            elements.audio.src = track.src;
            elements.trackTitle.textContent = track.title;
            elements.trackArtist.textContent = track.artist;
            elements.trackReadout.textContent = `Track ${String(trackIndex + 1).padStart(2, "0")} / ${String(tracks.length).padStart(2, "0")}`;
            currentLyrics = parseLrc(track.lrc);
            renderLyrics();
            localStorage.setItem(storage.track, String(trackIndex));
            if (restore) {
                const savedTime = Number.parseFloat(localStorage.getItem(storage.time) || "0");
                elements.audio.addEventListener("loadedmetadata", () => {
                    if (Number.isFinite(savedTime) && savedTime < elements.audio.duration - 1) {
                        elements.audio.currentTime = savedTime;
                    }
                }, { once: true });
            }
        }

        function syncPlayerState() {
            const duration = elements.audio.duration || 0;
            if (!isSeeking && duration > 0) {
                elements.progress.value = String(Math.round((elements.audio.currentTime / duration) * 1000));
            }
            elements.currentTime.textContent = formatTime(elements.audio.currentTime);
            elements.duration.textContent = formatTime(duration);
            elements.cover.classList.toggle("playing", !elements.audio.paused);
            elements.playButton.setAttribute("aria-label", elements.audio.paused ? "播放" : "暂停");
            elements.playIcon.innerHTML = elements.audio.paused ? icons.play : icons.pause;
            localStorage.setItem(storage.time, String(Math.round(elements.audio.currentTime)));
            updateLyricHighlight();
        }

        async function playAudio() {
            try {
                await elements.audio.play();
            } catch (error) {
                elements.live.textContent = "浏览器阻止了音频播放，请再次点击播放。";
            }
            syncPlayerState();
        }

        function pauseAudio() {
            elements.audio.pause();
            syncPlayerState();
        }

        function togglePlay() {
            if (elements.audio.paused) {
                playAudio();
            } else {
                pauseAudio();
            }
        }

        function nextTrack(manual = true) {
            const next = shuffle ? Math.floor(Math.random() * tracks.length) : trackIndex + 1;
            loadTrack(next);
            if (manual || !elements.audio.paused) playAudio();
        }

        function previousTrack() {
            if (elements.audio.currentTime > 4) {
                elements.audio.currentTime = 0;
            } else {
                loadTrack(trackIndex - 1);
            }
            playAudio();
        }

        function updateVolume() {
            const value = Number(elements.volume.value) / 100;
            elements.audio.volume = value;
            elements.volumeValue.textContent = elements.volume.value;
            localStorage.setItem(storage.volume, String(value));
        }

        function updateMuteUI() {
            elements.topSoundToggle.setAttribute("aria-pressed", String(elements.audio.muted));
            localStorage.setItem(storage.muted, String(elements.audio.muted));
        }

        function setSection(sectionId) {
            const section = sections[sectionId];
            if (!section) return;
            currentSection = sectionId;
            elements.shell.dataset.section = sectionId;
            elements.number.textContent = section.number;
            elements.label.textContent = section.label;
            elements.title.textContent = section.title;
            elements.status.textContent = section.status;
            elements.view.innerHTML = section.render();
            elements.feedbackTitle.textContent = section.feedback[0];
            elements.feedbackText.textContent = section.feedback[1];
            elements.sectionReadout.textContent = `Archive ${section.number}`;
            elements.live.textContent = `已切换到${section.title}`;

            navButtons.forEach((button) => {
                const active = button.dataset.section === sectionId;
                if (active) {
                    button.setAttribute("aria-current", "page");
                } else {
                    button.removeAttribute("aria-current");
                }
                button.setAttribute("aria-selected", String(active));
            });

            if (sectionId === "works") setupWorks();
            if (sectionId === "contact") setupContact();
        }

        function setupWorks() {
            const rows = Array.from(document.querySelectorAll(".project-row"));
            rows.forEach((row) => {
                row.addEventListener("click", () => {
                    const project = projectData[Number(row.dataset.project)];
                    rows.forEach((item) => item.classList.remove("active"));
                    row.classList.add("active");
                    document.getElementById("featured-kicker").textContent = `${project.year} / ${project.status}`;
                    document.getElementById("featured-title").textContent = project.title;
                    document.getElementById("featured-desc").textContent = project.desc;
                    document.getElementById("featured-tags").innerHTML = project.tags.map((tag) => `<span class="project-chip">${tag}</span>`).join("");
                });
            });
        }

        function setupContact() {
            document.querySelectorAll(".copy-button").forEach((button) => {
                button.addEventListener("click", async () => {
                    const value = button.dataset.copy;
                    try {
                        await navigator.clipboard.writeText(value);
                        elements.live.textContent = `已复制 ${value}`;
                        button.querySelector(".label").textContent = "Copied";
                    } catch (error) {
                        elements.live.textContent = value;
                    }
                    window.setTimeout(() => {
                        const label = button.querySelector(".label");
                        if (label) label.textContent = "Copy";
                    }, 1400);
                });
            });
        }

        function updateClock() {
            elements.clock.textContent = new Date().toLocaleTimeString("zh-CN", { hour: "2-digit", minute: "2-digit", hour12: false });
        }

        navButtons.forEach((button, index) => {
            button.addEventListener("click", () => setSection(button.dataset.section));
            button.addEventListener("keydown", (event) => {
                if (!["ArrowLeft", "ArrowRight", "Home", "End"].includes(event.key)) return;
                event.preventDefault();
                let nextIndex = index;
                if (event.key === "ArrowLeft") nextIndex = (index - 1 + navButtons.length) % navButtons.length;
                if (event.key === "ArrowRight") nextIndex = (index + 1) % navButtons.length;
                if (event.key === "Home") nextIndex = 0;
                if (event.key === "End") nextIndex = navButtons.length - 1;
                navButtons[nextIndex].focus();
                setSection(navButtons[nextIndex].dataset.section);
            });
        });

        elements.playButton.addEventListener("click", togglePlay);
        elements.prevButton.addEventListener("click", previousTrack);
        elements.nextButton.addEventListener("click", () => nextTrack(true));
        elements.shuffleButton.addEventListener("click", () => {
            shuffle = !shuffle;
            localStorage.setItem(storage.shuffle, String(shuffle));
            elements.shuffleButton.classList.toggle("active", shuffle);
            elements.shuffleButton.setAttribute("aria-pressed", String(shuffle));
        });
        elements.loopButton.addEventListener("click", () => {
            loopMode = loopMode === "all" ? "one" : loopMode === "one" ? "off" : "all";
            localStorage.setItem(storage.loop, loopMode);
            elements.loopButton.classList.toggle("active", loopMode !== "off");
            elements.loopButton.setAttribute("aria-pressed", String(loopMode !== "off"));
            elements.loopButton.setAttribute("aria-label", `循环模式：${loopMode}`);
        });
        elements.topSoundToggle.addEventListener("click", () => {
            elements.audio.muted = !elements.audio.muted;
            updateMuteUI();
        });
        elements.volume.addEventListener("input", updateVolume);
        elements.progress.addEventListener("input", () => { isSeeking = true; });
        elements.progress.addEventListener("change", () => {
            const duration = elements.audio.duration || 0;
            elements.audio.currentTime = duration * (Number(elements.progress.value) / 1000);
            isSeeking = false;
            syncPlayerState();
        });
        elements.lyricsWindow.addEventListener("scroll", () => {
            manualLyricsUntil = Date.now() + 3600;
        });
        elements.audio.addEventListener("timeupdate", syncPlayerState);
        elements.audio.addEventListener("loadedmetadata", syncPlayerState);
        elements.audio.addEventListener("play", syncPlayerState);
        elements.audio.addEventListener("pause", syncPlayerState);
        elements.audio.addEventListener("ended", () => {
            if (loopMode === "one") {
                elements.audio.currentTime = 0;
                playAudio();
            } else if (loopMode === "all" || trackIndex < tracks.length - 1) {
                nextTrack(false);
            } else {
                pauseAudio();
            }
        });

        updateClock();
        setInterval(updateClock, 30000);
        elements.volume.value = String(Math.round((Number.parseFloat(localStorage.getItem(storage.volume) || "0.34")) * 100));
        updateVolume();
        elements.audio.muted = localStorage.getItem(storage.muted) === "true";
        updateMuteUI();
        elements.shuffleButton.classList.toggle("active", shuffle);
        elements.shuffleButton.setAttribute("aria-pressed", String(shuffle));
        elements.loopButton.classList.toggle("active", loopMode !== "off");
        elements.loopButton.setAttribute("aria-pressed", String(loopMode !== "off"));
        loadTrack(trackIndex, true);
        setSection("about");
    </script>
</body>
</html>
